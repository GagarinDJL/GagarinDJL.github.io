# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
title: 'Jialing Dai'
appearance:
  mode: system
  theme_day: minimal
  theme_night: minimal
  font: classic
  color_theme: ocean

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: 'University of Chinese Academy of Sciences (UCAS)'
    description: 'Ph.D. candidate at UCAS developing problem-driven computational models, provable optimization methods, learning-based solvers, and data experiments for real-world decision problems.'
    keywords:
      - Problem-Driven Computational Modeling
      - Mathematical Modeling
      - Combinatorial Optimization
      - Approximation Algorithms
      - Sampling Algorithms
      - Coverage Optimization
      - Reinforcement Learning
      - Graph Neural Networks
      - Data-Driven Decision Analytics
      - Empirical Validation
      - AI-Generated Content Provenance
      - Information Systems
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    block: 'navbar'
    fixed_to_top: true
    show_search: true
    show_theme_chooser: true
    logo:
      text: 'Jialing Dai'

# Site footer
footer:
  copyright:
    notice: '© {year} Jialing Dai. This work is licensed under {license}'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: true
  privacy_pack:
    enable: false
